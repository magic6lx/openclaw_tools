<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenClaw Launcher</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 20px;
      min-height: 100vh;
    }
    .container {
      max-width: 360px;
      margin: 0 auto;
    }
    h1 {
      font-size: 24px;
      margin-bottom: 20px;
      text-align: center;
    }
    .status-card {
      background: rgba(255,255,255,0.15);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 15px;
      backdrop-filter: blur(10px);
    }
    .status-item {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .status-item:last-child {
      border-bottom: none;
    }
    .label { opacity: 0.8; }
    .value { font-weight: 600; }
    .value.installed { color: #4ade80; }
    .value.not-installed { color: #f87171; }
    .value.running { color: #4ade80; }
    .value.stopped { color: #fbbf24; }
    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 10px;
    }
    .btn-primary {
      background: #4f46e5;
      color: white;
    }
    .btn-primary:hover {
      background: #4338ca;
      transform: translateY(-1px);
    }
    .btn-secondary {
      background: rgba(255,255,255,0.2);
      color: white;
    }
    .btn-secondary:hover {
      background: rgba(255,255,255,0.3);
    }
    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .loading {
      text-align: center;
      padding: 20px;
    }
    .spinner {
      border: 3px solid rgba(255,255,255,0.3);
      border-top: 3px solid white;
      border-radius: 50%;
      width: 30px;
      height: 30px;
      animation: spin 1s linear infinite;
      margin: 0 auto 10px;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .info {
      font-size: 12px;
      opacity: 0.7;
      text-align: center;
      margin-top: 15px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🚀 OpenClaw Launcher</h1>

    <div id="loading" class="status-card loading">
      <div class="spinner"></div>
      <div>正在检测...</div>
    </div>

    <div id="content" style="display: none;">
      <div class="status-card">
        <div class="status-item">
          <span class="label">系统</span>
          <span class="value" id="platform">-</span>
        </div>
        <div class="status-item">
          <span class="label">用户名</span>
          <span class="value" id="username">-</span>
        </div>
        <div class="status-item">
          <span class="label">OpenClaw 目录</span>
          <span class="value" id="directory">-</span>
        </div>
        <div class="status-item">
          <span class="label">安装状态</span>
          <span class="value" id="installed">-</span>
        </div>
        <div class="status-item">
          <span class="label">Gateway 状态</span>
          <span class="value" id="gateway">-</span>
        </div>
      </div>

      <button class="btn btn-primary" id="btnLaunch" onclick="launchOpenClaw()">
        启动 OpenClaw
      </button>

      <button class="btn btn-secondary" onclick="refreshStatus()">
        刷新状态
      </button>
    </div>

    <div class="info">
      浏览器可通过 openclaw://check 检测本机状态
    </div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
