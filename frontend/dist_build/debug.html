<!DOCTYPE html>
<html>
<head>
    <title>调试用户信息</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background-color: #f5f5f5;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .section {
            margin-bottom: 20px;
            padding: 15px;
            border: 1px solid #e0e0e0;
            border-radius: 4px;
        }
        .success {
            background-color: #d4edda;
            border-color: #c3e6cb;
            color: #155724;
        }
        .error {
            background-color: #f8d7da;
            border-color: #f5c6cb;
            color: #721c24;
        }
        .info {
            background-color: #d1ecf1;
            border-color: #bee5eb;
            color: #0c5460;
        }
        pre {
            background-color: #f8f9fa;
            padding: 10px;
            border-radius: 4px;
            overflow-x: auto;
        }
        button {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            margin-right: 10px;
        }
        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>用户信息调试工具</h1>
        
        <div class="section">
            <h3>操作</h3>
            <button onclick="clearLocalStorage()">清除LocalStorage</button>
            <button onclick="checkUserInfo()">检查用户信息</button>
            <button onclick="setAdminRole()">设置管理员角色</button>
        </div>
        
        <div class="section info">
            <h3>说明</h3>
            <p>1. 点击"清除LocalStorage"清除旧的缓存数据</p>
            <p>2. 点击"检查用户信息"查看当前登录状态</p>
            <p>3. 如果用户信息中没有role字段，点击"设置管理员角色"手动添加</p>
            <p>4. 然后刷新页面重新登录</p>
        </div>
        
        <div id="result"></div>
    </div>

    <script>
        function clearLocalStorage() {
            localStorage.clear();
            showResult('LocalStorage已清除', 'success');
        }

        function checkUserInfo() {
            const token = localStorage.getItem('token');
            const userStr = localStorage.getItem('user');
            
            let html = '<div class="section">';
            html += '<h3>用户信息</h3>';
            
            if (token) {
                html += '<p><strong>Token:</strong> ' + token.substring(0, 50) + '...</p>';
            } else {
                html += '<p><strong>Token:</strong> 未找到</p>';
            }
            
            if (userStr) {
                const user = JSON.parse(userStr);
                html += '<p><strong>用户数据:</strong></p>';
                html += '<pre>' + JSON.stringify(user, null, 2) + '</pre>';
                
                if (user.role === 'admin') {
                    html += '<p class="success"><strong>✅ 用户是管理员</strong></p>';
                } else {
                    html += '<p class="error"><strong>❌ 用户不是管理员 (role: ' + user.role + ')</strong></p>';
                }
            } else {
                html += '<p><strong>用户数据:</strong> 未找到</p>';
                html += '<p class="error"><strong>❌ 未登录</strong></p>';
            }
            
            html += '</div>';
            document.getElementById('result').innerHTML = html;
        }

        function setAdminRole() {
            const userStr = localStorage.getItem('user');
            if (!userStr) {
                showResult('未找到用户信息，请先登录', 'error');
                return;
            }
            
            const user = JSON.parse(userStr);
            user.role = 'admin';
            localStorage.setItem('user', JSON.stringify(user));
            showResult('已设置管理员角色，请刷新页面', 'success');
        }

        function showResult(message, type) {
            const html = '<div class="section ' + type + '"><p>' + message + '</p></div>';
            document.getElementById('result').innerHTML = html;
        }

        // 页面加载时自动检查
        window.onload = function() {
            checkUserInfo();
        };
    </script>
</body>
</html>
